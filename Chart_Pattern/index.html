<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chart Pattern Intelligence — ET Markets</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090b0f;
    --surface: #0f1116;
    --surface2: #161a22;
    --surface3: #1c2030;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #dde1eb;
    --muted: #5a6070;
    --muted2: #8b95a8;
    --accent: #f59e0b;
    --accent2: #fbbf24;
    --green: #10b981;
    --green2: #34d399;
    --red: #ef4444;
    --red2: #f87171;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
    --body: 'DM Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font-family:var(--body); overflow:hidden;
    height:100vh;
  }

  /* GRID TEXTURE */
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image:
      linear-gradient(rgba(245,158,11,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,158,11,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ── HEADER ──────────────────────────────────── */
  header {
    position:relative; z-index:20;
    height:60px; padding:0 28px;
    border-bottom: 1px solid var(--border);
    background:rgba(9,11,15,0.97);
    backdrop-filter:blur(24px);
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0;
  }
  .logo { display:flex; align-items:center; gap:14px; }
  .logo-hex {
    width:38px; height:38px; background:var(--accent);
    clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .logo-hex svg { width:18px; height:18px; }
  .logo-name { font-family:var(--display); font-size:16px; font-weight:800; letter-spacing:-0.4px; }
  .logo-badge {
    font-family:var(--mono); font-size:9px; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--muted2); margin-top:1px;
  }
  .header-center {
    display:flex; gap:6px;
  }
  .nifty-pill {
    display:flex; align-items:center; gap:8px;
    padding:5px 14px; border-radius:20px;
    border:1px solid var(--border); background:var(--surface2);
    font-family:var(--mono); font-size:11px;
  }
  .nifty-pill .n-name { color:var(--muted2); }
  .nifty-pill .n-val { color:var(--text); font-weight:500; }
  .nifty-pill .n-chg.up { color:var(--green); }
  .nifty-pill .n-chg.dn { color:var(--red); }

  .header-right { display:flex; align-items:center; gap:16px; }
  .live-indicator {
    display:flex; align-items:center; gap:7px;
    font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--green);
  }
  .live-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:livepulse 2s ease-in-out infinite; }
  @keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
  .scan-info { font-family:var(--mono); font-size:10px; color:var(--muted); }

  .rescan-btn {
    font-family:var(--mono); font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
    padding:7px 18px; border-radius:6px; cursor:pointer;
    background:var(--accent); color:#0a0900; border:none; font-weight:500;
    transition:background 0.15s, transform 0.1s;
  }
  .rescan-btn:hover { background:var(--accent2); }
  .rescan-btn:active { transform:scale(0.97); }
  .rescan-btn.loading { background:var(--surface3); color:var(--accent); border:1px solid rgba(245,158,11,0.3); cursor:default; }

  /* ── BODY LAYOUT ─────────────────────────────── */
  .app-body {
    position:relative; z-index:1;
    display:flex; height:calc(100vh - 60px - 34px);
  }

  /* ── SIDEBAR ─────────────────────────────────── */
  .sidebar {
    width:372px; flex-shrink:0;
    border-right:1px solid var(--border);
    background:var(--surface);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .sidebar-top {
    padding:18px 18px 14px;
    border-bottom:1px solid var(--border);
    background:var(--surface2);
    flex-shrink:0;
  }
  .sidebar-label {
    font-family:var(--mono); font-size:9px; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--muted); margin-bottom:6px;
  }
  .signal-counter {
    font-family:var(--display); font-size:30px; font-weight:800; line-height:1;
  }
  .signal-counter em { color:var(--accent); font-style:normal; }

  .filter-strip {
    padding:10px 14px;
    border-bottom:1px solid var(--border);
    display:flex; gap:5px; flex-shrink:0;
  }
  .fbtn {
    font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
    padding:5px 11px; border-radius:4px; cursor:pointer;
    border:1px solid var(--border); background:transparent; color:var(--muted);
    transition:all 0.15s; white-space:nowrap;
  }
  .fbtn:hover { border-color:var(--border2); color:var(--text); }
  .fbtn.active { background:var(--accent); color:#0a0900; border-color:var(--accent); font-weight:500; }
  .fbtn.b-bull.active { background:var(--green); border-color:var(--green); color:#051c12; }
  .fbtn.b-bear.active { background:var(--red); border-color:var(--red); color:#200a0a; }

  .signal-scroll {
    flex:1; overflow-y:auto; padding:8px;
  }
  .signal-scroll::-webkit-scrollbar { width:3px; }
  .signal-scroll::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:2px; }

  /* ── SIGNAL CARD ─────────────────────────────── */
  .sig-card {
    padding:13px 15px; border-radius:8px; margin-bottom:5px;
    border:1px solid var(--border); background:var(--surface2);
    cursor:pointer; transition:all 0.15s;
    position:relative; overflow:hidden;
    animation:cardIn 0.3s ease both;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .sig-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:0 0 0 8px;
  }
  .sig-card.bull::before { background:var(--green); }
  .sig-card.bear::before { background:var(--red); }
  .sig-card:hover { border-color:var(--border2); }
  .sig-card.selected { border-color:rgba(245,158,11,0.5); background:rgba(245,158,11,0.04); }

  .sc-row1 { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:7px; }
  .sc-sym { font-family:var(--display); font-size:15px; font-weight:700; }
  .sc-sector { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:1px; }
  .sc-conv { font-family:var(--mono); text-align:right; }
  .sc-conv-num { font-size:19px; font-weight:600; line-height:1; }
  .sc-conv-lbl { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; opacity:0.65; }

  .sc-pattern { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
  .sc-pname { font-size:12px; font-weight:500; }
  .dir-pill {
    font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase;
    padding:2px 8px; border-radius:3px;
  }
  .bull .dir-pill { background:rgba(16,185,129,0.14); color:var(--green); }
  .bear .dir-pill { background:rgba(239,68,68,0.14); color:var(--red); }

  .sc-metrics { display:flex; gap:18px; }
  .sc-m-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
  .sc-m-value { font-family:var(--mono); font-size:12px; font-weight:500; margin-top:1px; }

  .mini-c { height:36px; margin-top:9px; }

  /* ── MAIN ────────────────────────────────────── */
  .main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  .stats-ribbon {
    padding:14px 26px; border-bottom:1px solid var(--border);
    background:var(--surface2); flex-shrink:0;
    display:flex; gap:28px; align-items:center;
  }
  .sr-item {}
  .sr-lbl { font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
  .sr-val { font-family:var(--display); font-size:22px; font-weight:800; line-height:1.1; margin-top:3px; }
  .sr-val.g { color:var(--green); }
  .sr-val.r { color:var(--red); }
  .sr-val.a { color:var(--accent); }
  .sr-div { width:1px; height:34px; background:var(--border); }

  .detail-area { flex:1; overflow-y:auto; padding:22px 26px 26px; }
  .detail-area::-webkit-scrollbar { width:3px; }
  .detail-area::-webkit-scrollbar-thumb { background:var(--border2); }

  /* Empty state */
  .empty-state {
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px; color:var(--muted);
    text-align:center;
  }
  .empty-state p { font-size:14px; }

  /* ── DETAIL CONTENT ──────────────────────────── */
  .dc { animation:dcIn 0.2s ease both; }
  @keyframes dcIn { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:none} }

  .dc-header {
    display:flex; justify-content:space-between; align-items:flex-start;
    margin-bottom:20px;
  }
  .dc-sym { font-family:var(--display); font-size:38px; font-weight:800; letter-spacing:-1.5px; line-height:1; }
  .dc-meta { display:flex; align-items:center; gap:10px; margin-top:6px; }
  .dc-price { font-family:var(--mono); font-size:20px; font-weight:500; }
  .sector-chip {
    font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase;
    padding:3px 10px; border-radius:4px;
    border:1px solid var(--border2); color:var(--muted2);
  }
  .conv-widget { text-align:center; }
  .conv-num { font-family:var(--display); font-size:28px; font-weight:800; }
  .conv-sub { font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-top:3px; }

  /* Pattern strip */
  .pattern-strip {
    display:flex; align-items:center; gap:14px;
    padding:14px 18px; border-radius:10px; margin-bottom:16px;
    border:1px solid var(--border); background:var(--surface2);
  }
  .pattern-icon-box {
    width:46px; height:46px; border-radius:9px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:22px;
  }
  .bull .pattern-icon-box { background:rgba(16,185,129,0.1); }
  .bear .pattern-icon-box { background:rgba(239,68,68,0.1); }
  .ps-name { font-family:var(--display); font-size:17px; font-weight:700; }
  .ps-sub { font-size:12px; color:var(--muted2); margin-top:3px; }

  /* Chips */
  .chips-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px; }
  .chip {
    display:flex; align-items:center; gap:6px;
    padding:5px 12px; border-radius:20px;
    font-family:var(--mono); font-size:10px; letter-spacing:0.5px;
    border:1px solid var(--border);
  }
  .chip.pos { background:rgba(16,185,129,0.08); border-color:rgba(16,185,129,0.22); color:var(--green2); }
  .chip.neg { background:rgba(239,68,68,0.08); border-color:rgba(239,68,68,0.22); color:var(--red2); }
  .chip.neu { background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.22); color:var(--accent2); }
  .chip-dot { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }

  /* Chart box */
  .chart-box {
    background:var(--surface2); border-radius:10px;
    border:1px solid var(--border); padding:18px 18px 14px;
    margin-bottom:18px;
  }
  .box-title {
    font-family:var(--mono); font-size:9px; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--muted); margin-bottom:14px;
  }
  .chart-wrap { height:200px; position:relative; }

  /* Trade levels */
  .trade-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:18px; }
  .trade-lv {
    padding:14px 16px; border-radius:8px; text-align:center;
    border:1px solid var(--border);
  }
  .trade-lv.tgt { background:rgba(16,185,129,0.06); border-color:rgba(16,185,129,0.2); }
  .trade-lv.cur { background:rgba(245,158,11,0.06); border-color:rgba(245,158,11,0.2); }
  .trade-lv.stp { background:rgba(239,68,68,0.06); border-color:rgba(239,68,68,0.2); }
  .tl-label { font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; }
  .tgt .tl-label { color:var(--green); }
  .cur .tl-label { color:var(--accent); }
  .stp .tl-label { color:var(--red); }
  .tl-price { font-family:var(--mono); font-size:17px; font-weight:500; }
  .tl-pct { font-size:11px; color:var(--muted2); margin-top:2px; }

  /* Metrics grid */
  .mGrid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
  .mCard {
    background:var(--surface2); border-radius:8px; border:1px solid var(--border);
    padding:12px 14px;
  }
  .mCard-lbl { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  .mCard-val { font-family:var(--display); font-size:19px; font-weight:700; }
  .mCard-sub { font-size:11px; color:var(--muted2); margin-top:3px; }

  /* Insight */
  .insight-box {
    background:var(--surface2); border-radius:10px;
    border:1px solid var(--border); padding:18px 20px; margin-bottom:18px;
  }
  .insight-header {
    display:flex; align-items:center; gap:7px; margin-bottom:12px;
    font-family:var(--mono); font-size:9px; letter-spacing:2.5px; text-transform:uppercase; color:var(--accent);
  }
  .insight-dot { width:6px; height:6px; background:var(--accent); border-radius:50%; animation:livepulse 2s infinite; }
  .insight-text { font-size:13.5px; line-height:1.8; color:rgba(221,225,235,0.82); }

  /* Backtest */
  .bt-box {
    background:var(--surface2); border-radius:10px;
    border:1px solid var(--border); padding:18px 20px; margin-bottom:18px;
  }
  .bt-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:16px; }
  .bt-item { text-align:center; }
  .bt-bar-bg { height:3px; background:rgba(255,255,255,0.06); border-radius:2px; margin-bottom:10px; overflow:hidden; }
  .bt-bar-fill { height:100%; border-radius:2px; transition:width 0.8s ease; }
  .bt-val { font-family:var(--display); font-size:24px; font-weight:800; }
  .bt-lbl { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); margin-top:5px; }

  /* ── TICKER ──────────────────────────────────── */
  .ticker-bar {
    position:relative; z-index:20;
    height:34px; background:rgba(9,11,15,0.98);
    border-top:1px solid var(--border);
    display:flex; align-items:center; overflow:hidden; flex-shrink:0;
  }
  .ticker-tag {
    padding:0 14px; height:100%; display:flex; align-items:center;
    font-family:var(--mono); font-size:9px; letter-spacing:2.5px; text-transform:uppercase;
    color:var(--accent); border-right:1px solid var(--border); white-space:nowrap; flex-shrink:0;
  }
  .ticker-scroll { flex:1; overflow:hidden; }
  .ticker-inner { display:flex; animation:tickerMove 80s linear infinite; }
  .t-item {
    padding:0 22px; display:flex; align-items:center; gap:7px;
    font-family:var(--mono); font-size:10px; white-space:nowrap;
  }
  .t-n { color:var(--muted); }
  .t-p { color:var(--text); }
  .t-u { color:var(--green); }
  .t-d { color:var(--red); }
  @keyframes tickerMove { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

  /* empty signal */
  .no-sig { padding:32px 16px; text-align:center; color:var(--muted); font-size:13px; }
</style>
</head>
<body>


<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-hex">
      <svg viewBox="0 0 18 18" fill="none">
        <path d="M9 1.5L15.5 5.25V12.75L9 16.5L2.5 12.75V5.25L9 1.5Z" fill="#0a0900" stroke="none"/>
        <path d="M9 5L12 6.75V10.25L9 12L6 10.25V6.75L9 5Z" fill="rgba(245,158,11,0.6)"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">Chart Pattern Intelligence</div>
      <div class="logo-badge">ET Markets · NSE Signal Radar</div>
    </div>
  </div>
  <div class="header-center" id="headerIndices"></div>
  <div class="header-right">
    <div class="live-indicator"><div class="live-dot"></div>LIVE</div>
    <div class="scan-info" id="scanInfo">Scanning NSE universe...</div>
    <button class="rescan-btn" id="rescanBtn" onclick="runRescan()">↻ Rescan</button>
  </div>
</header>

<!-- MAIN -->
<div class="app-body">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="sidebar-label">Signal Radar</div>
      <div class="signal-counter" id="sigCount">— <em>signals</em></div>
    </div>
    <div class="filter-strip">
      <button class="fbtn active" onclick="applyFilter(this,'all')">All</button>
      <button class="fbtn b-bull" onclick="applyFilter(this,'bull')">▲ Bullish</button>
      <button class="fbtn b-bear" onclick="applyFilter(this,'bear')">▼ Bearish</button>
      <button class="fbtn" onclick="applyFilter(this,'high')">⚡ High</button>
    </div>
    <div class="signal-scroll" id="sigScroll">
      <div class="no-sig">Scanning NSE stocks...</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-area">
    <div class="stats-ribbon">
      <div class="sr-item">
        <div class="sr-lbl">Bullish</div>
        <div class="sr-val g" id="sBull">—</div>
      </div>
      <div class="sr-div"></div>
      <div class="sr-item">
        <div class="sr-lbl">Bearish</div>
        <div class="sr-val r" id="sBear">—</div>
      </div>
      <div class="sr-div"></div>
      <div class="sr-item">
        <div class="sr-lbl">Avg Conviction</div>
        <div class="sr-val a" id="sAvg">—</div>
      </div>
      <div class="sr-div"></div>
      <div class="sr-item">
        <div class="sr-lbl">High Conv (>75)</div>
        <div class="sr-val" id="sHigh">—</div>
      </div>
      <div class="sr-div"></div>
      <div class="sr-item">
        <div class="sr-lbl">Stocks Scanned</div>
        <div class="sr-val">20</div>
      </div>
    </div>
    <div class="detail-area" id="detailArea">
      <div class="empty-state" id="emptyState">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <p>Select a signal from the radar to view<br>full pattern intelligence &amp; backtest</p>
      </div>
      <div id="detailContent" style="display:none"></div>
    </div>
  </div>
</div>

<!-- TICKER -->
<div class="ticker-bar">
  <div class="ticker-tag">NSE Live</div>
  <div class="ticker-scroll">
    <div class="ticker-inner" id="tickerInner"></div>
  </div>
</div>

<script>
// API Configuration
const API_BASE = 'http://localhost:8000/api';

let signals = [];
let filterMode = 'all';
let filtered = [...signals];
let selected = null;
let miniCharts = {};
let detailChart = null;

// ── API HELPERS ────────────────────────────────
async function fetchSignals() {
  try {
    const response = await fetch(`${API_BASE}/signals`);
    if (!response.ok) throw new Error('Failed to fetch signals');
    const data = await response.json();
    signals = data.signals || [];
    filtered = [...signals];
    return data;
  } catch (error) {
    console.error('Error fetching signals:', error);
    signals = [];
    filtered = [];
    showError('Failed to load signals. Make sure the server is running.');
    return { signals: [] };
  }
}

async function fetchStats() {
  try {
    const response = await fetch(`${API_BASE}/stats`);
    if (!response.ok) throw new Error('Failed to fetch stats');
    return await response.json();
  } catch (error) {
    console.error('Error fetching stats:', error);
    return null;
  }
}

async function triggerScan() {
  try {
    const response = await fetch(`${API_BASE}/scan`, { method: 'POST' });
    if (!response.ok) throw new Error('Scan request failed');
    return await response.json();
  } catch (error) {
    console.error('Error triggering scan:', error);
    showError('Failed to start scan');
    return null;
  }
}

function showError(msg) {
  const wrap = document.getElementById('sigScroll');
  wrap.innerHTML = `<div class="no-sig" style="color:#ef4444;">⚠️ ${msg}</div>`;
}

// ──────────────────────────────────────────────
async function init() {
  await fetchSignals();
  renderStats();
  renderCards();
  buildTicker();
  buildHeaderIndices();
  updateScanInfo();
  setTimeout(() => { if(filtered.length) selectSignal(filtered[0]); }, 400);
  // Poll for updates every 30 seconds
  setInterval(pollForUpdates, 5000);  // Poll every 5 seconds for real-time updates
}

async function pollForUpdates() {
  const stats = await fetchStats();
  if (stats && stats.last_scan_time) {
    updateScanInfo(stats.last_scan_time);
  }
}

function updateScanInfo(lastScanTime) {
  let text = 'Connecting to server...';
  if (lastScanTime) {
    try {
      const date = new Date(lastScanTime);
      const t = date.toLocaleTimeString('en-IN', {hour: '2-digit', minute: '2-digit'});
      text = 'Last scan: ' + t + ' IST';
    } catch (e) {
      text = 'Last scan: ' + lastScanTime;
    }
  }
  document.getElementById('scanInfo').textContent = text;
}

async function runRescan() {
  const btn = document.getElementById('rescanBtn');
  if (btn.classList.contains('loading')) return;
  
  btn.textContent = '⟳ Scanning...';
  btn.classList.add('loading');
  
  try {
    const result = await triggerScan();
    if (result) {
      // Poll for completion (max 60 seconds)
      let attempts = 0;
      const pollInterval = setInterval(async () => {
        attempts++;
        const data = await fetchSignals();
        if (data.signals && data.signals.length > 0) {
          clearInterval(pollInterval);
          renderStats();
          renderCards();
          btn.textContent = '↻ Rescan';
          btn.classList.remove('loading');
          updateScanInfo();
        } else if (attempts > 60) {
          clearInterval(pollInterval);
          btn.textContent = '↻ Rescan';
          btn.classList.remove('loading');
          showError('Scan timeout - please try again');
        }
      }, 1000);
    }
  } catch (error) {
    console.error('Rescan error:', error);
    btn.textContent = '↻ Rescan';
    btn.classList.remove('loading');
  }
}

// ── STATS ──────────────────────────────────────
function renderStats() {
  const bull = signals.filter(s=>s.direction==='bullish').length;
  const bear = signals.filter(s=>s.direction==='bearish').length;
  const avg = Math.round(signals.reduce((a,s)=>a+s.conviction,0)/signals.length);
  const high = signals.filter(s=>s.conviction>75).length;
  document.getElementById('sBull').textContent = bull;
  document.getElementById('sBear').textContent = bear;
  document.getElementById('sAvg').textContent = avg+'/100';
  document.getElementById('sHigh').textContent = high;
  document.getElementById('sigCount').innerHTML = filtered.length + ' <em>signals</em>';
}

// ── FILTER ─────────────────────────────────────
function applyFilter(btn, f) {
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(f==='all') filtered=[...signals];
  else if(f==='bull') filtered=signals.filter(s=>s.direction==='bullish');
  else if(f==='bear') filtered=signals.filter(s=>s.direction==='bearish');
  else filtered=signals.filter(s=>s.conviction>75);
  document.getElementById('sigCount').innerHTML = filtered.length + ' <em>signals</em>';
  renderCards();
}

// ── SIGNAL CARDS ───────────────────────────────
function renderCards() {
  const wrap = document.getElementById('sigScroll');
  if(!filtered.length) {
    wrap.innerHTML='<div class="no-sig">No signals match this filter.</div>';
    return;
  }
  wrap.innerHTML='';
  filtered.forEach((s,i) => {
    const isBull = s.direction==='bullish';
    const tPct = ((s.target-s.current_price)/s.current_price*100);
    const tStr = (isBull?'+':'')+tPct.toFixed(1)+'%';
    const div = document.createElement('div');
    div.className='sig-card '+(isBull?'bull':'bear')+(selected&&selected.symbol===s.symbol?' selected':'');
    div.style.animationDelay=(i*25)+'ms';
    div.innerHTML=`
      <div class="sc-row1">
        <div>
          <div class="sc-sym">${s.symbol}</div>
          <div class="sc-sector">${s.sector || 'Unknown'}</div>
        </div>
        <div class="sc-conv">
          <div class="sc-conv-num" style="color:${s.conviction_color}">${s.conviction}</div>
          <div class="sc-conv-lbl">${s.conviction_label}</div>
        </div>
      </div>
      <div class="sc-pattern">
        <span class="sc-pname">${s.pattern}</span>
        <span class="dir-pill">${s.direction}</span>
      </div>
      <div class="sc-metrics">
        <div><div class="sc-m-label">Price</div><div class="sc-m-value">₹${s.current_price.toLocaleString('en-IN')}</div></div>
        <div><div class="sc-m-label">Target</div><div class="sc-m-value" style="color:${isBull?'var(--green)':'var(--red)'}">${tStr}</div></div>
        <div><div class="sc-m-label">Win Rate</div><div class="sc-m-value">${Math.round(s.win_rate*100)}%</div></div>
      </div>
      <div class="mini-c"><canvas id="mc_${s.symbol}"></canvas></div>
    `;
    div.onclick=()=>selectSignal(s);
    wrap.appendChild(div);
    setTimeout(()=>drawMini('mc_'+s.symbol,s),60+i*20);
  });
}

function drawMini(id,s) {
  const c=document.getElementById(id); if(!c) return;
  if(miniCharts[id]){miniCharts[id].destroy();}
  const col=s.direction==='bullish'?'#10b981':'#ef4444';
  const pts=s.price_history.slice(-30);
  miniCharts[id]=new Chart(c.getContext('2d'),{
    type:'line',
    data:{labels:pts.map((_,i)=>i),datasets:[{data:pts,borderColor:col,borderWidth:1.5,fill:true,
      backgroundColor:(ctx)=>{
        const g=ctx.chart.ctx.createLinearGradient(0,0,0,36);
        g.addColorStop(0,col+'35');g.addColorStop(1,col+'00');return g;
      },pointRadius:0,tension:0.35}]},
    options:{animation:false,responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{enabled:false}},
      scales:{x:{display:false},y:{display:false}}}
  });
}

// ── DETAIL ─────────────────────────────────────
function selectSignal(sig) {
  selected = sig;
  document.querySelectorAll('.sig-card').forEach(c=>c.classList.remove('selected'));
  const cards = document.querySelectorAll('.sig-card');
  filtered.forEach((s,i)=>{ if(s.symbol===sig.symbol) cards[i]?.classList.add('selected'); });
  renderDetail(sig);
}

function renderDetail(s) {
  document.getElementById('emptyState').style.display='none';
  const el=document.getElementById('detailContent');
  el.style.display='block';
  const isBull=s.direction==='bullish';
  const dc=isBull?'var(--green)':'var(--red)';
  const tPct=((s.target-s.current_price)/s.current_price*100);
  const stPct=((s.stop_loss-s.current_price)/s.current_price*100);
  const rr=Math.abs(tPct/stPct).toFixed(1);
  const rrOk=parseFloat(rr)>=2;

  let rsiCls='neu',rsiLbl='RSI '+s.rsi;
  if(isBull&&s.rsi<40){rsiCls='pos';rsiLbl='RSI '+s.rsi+' — oversold';}
  else if(!isBull&&s.rsi>65){rsiCls='neg';rsiLbl='RSI '+s.rsi+' — overbought';}
  else if(isBull&&s.rsi>70){rsiCls='neg';rsiLbl='RSI '+s.rsi+' — overbought';}

  el.innerHTML=`
    <div class="dc ${isBull?'bull':'bear'}">
      <div class="dc-header">
        <div>
          <div class="dc-sym">${s.symbol}</div>
          <div class="dc-meta">
            <span class="dc-price">₹${s.current_price.toLocaleString('en-IN')}</span>
            <span class="sector-chip">${s.sector || 'Unknown'}</span>
          </div>
        </div>
        <div class="conv-widget">
          <canvas id="convArc" width="88" height="88"></canvas>
          <div class="conv-num" style="color:${s.conviction_color}">${s.conviction}</div>
          <div class="conv-sub">conviction</div>
        </div>
      </div>

      <div class="pattern-strip ${isBull?'bull':'bear'}">
        <div class="pattern-icon-box">${isBull?'📈':'📉'}</div>
        <div>
          <div class="ps-name">${s.pattern}</div>
          <div class="ps-sub">${isBull?'Bullish':'Bearish'} · ${s.conviction_label} Conviction · Volume ${s.volume_confirm?'✓ Confirmed':'✗ Unconfirmed'}</div>
        </div>
      </div>

      <div class="chips-row">
        <div class="chip ${isBull?'pos':'neg'}"><div class="chip-dot"></div>${s.direction.toUpperCase()} SIGNAL</div>
        <div class="chip ${rsiCls}"><div class="chip-dot"></div>${rsiLbl}</div>
        <div class="chip ${s.volume_confirm?'pos':'neu'}"><div class="chip-dot"></div>Vol ${s.vol_ratio}x avg</div>
        <div class="chip ${s.trend_aligned?'pos':'neu'}"><div class="chip-dot"></div>${s.trend_aligned?'Trend Aligned':'Mixed Trend'}</div>
      </div>

      <div class="chart-box">
        <div class="box-title">60-Day Price Action — ${s.symbol}</div>
        <div class="chart-wrap"><canvas id="detailC"></canvas></div>
      </div>

      <div class="trade-row">
        <div class="trade-lv tgt">
          <div class="tl-label">Target</div>
          <div class="tl-price" style="color:var(--green)">₹${Math.round(s.target).toLocaleString('en-IN')}</div>
          <div class="tl-pct" style="color:var(--green)">${tPct>=0?'+':''}${tPct.toFixed(1)}%</div>
        </div>
        <div class="trade-lv cur">
          <div class="tl-label">Current Price</div>
          <div class="tl-price" style="color:var(--accent)">₹${s.current_price.toLocaleString('en-IN')}</div>
          <div class="tl-pct">Entry Zone</div>
        </div>
        <div class="trade-lv stp">
          <div class="tl-label">Stop Loss</div>
          <div class="tl-price" style="color:var(--red)">₹${Math.round(s.stop_loss).toLocaleString('en-IN')}</div>
          <div class="tl-pct" style="color:var(--red)">${stPct.toFixed(1)}%</div>
        </div>
      </div>

      <div class="mGrid">
        <div class="mCard">
          <div class="mCard-lbl">Risk / Reward</div>
          <div class="mCard-val" style="color:${rrOk?'var(--green)':'var(--accent)'}">${rr}:1</div>
          <div class="mCard-sub">${rrOk?'Favorable setup':'Below optimal'}</div>
        </div>
        <div class="mCard">
          <div class="mCard-lbl">Key Level</div>
          <div class="mCard-val">₹${Math.round(s.key_level).toLocaleString('en-IN')}</div>
          <div class="mCard-sub">Critical breakout zone</div>
        </div>
        <div class="mCard">
          <div class="mCard-lbl">Avg Duration</div>
          <div class="mCard-val">${s.avg_days}d</div>
          <div class="mCard-sub">Historical avg to target</div>
        </div>
        <div class="mCard">
          <div class="mCard-lbl">Avg Move</div>
          <div class="mCard-val" style="color:${dc}">${isBull?'+':'−'}${s.avg_gain}%</div>
          <div class="mCard-sub">After this pattern fires</div>
        </div>
      </div>

      <div class="insight-box">
        <div class="insight-header"><div class="insight-dot"></div>AI Signal Intelligence</div>
        <div class="insight-text">${s.insight}</div>
      </div>

      <div class="bt-box">
        <div class="box-title">Historical Backtest — ${s.symbol} — Last 3 Years</div>
        <div class="bt-grid">
          <div class="bt-item">
            <div class="bt-bar-bg"><div class="bt-bar-fill" style="width:${Math.round(s.win_rate*100)}%;background:var(--green)"></div></div>
            <div class="bt-val" style="color:var(--green)">${Math.round(s.win_rate*100)}%</div>
            <div class="bt-lbl">Win Rate</div>
          </div>
          <div class="bt-item">
            <div class="bt-bar-bg"><div class="bt-bar-fill" style="width:${Math.min(s.occurrences*12,100)}%;background:var(--accent)"></div></div>
            <div class="bt-val" style="color:var(--accent)">${s.occurrences}</div>
            <div class="bt-lbl">Occurrences</div>
          </div>
          <div class="bt-item">
            <div class="bt-bar-bg"><div class="bt-bar-fill" style="width:${Math.min(s.avg_gain*6,100)}%;background:${dc}"></div></div>
            <div class="bt-val" style="color:${dc}">${s.avg_gain}%</div>
            <div class="bt-lbl">Avg Gain</div>
          </div>
        </div>
      </div>
    </div>
  `;

  setTimeout(()=>{
    drawArc('convArc',s.conviction,s.conviction_color);
    drawDetailChart(s);
  },50);
}

function drawArc(id,val,col) {
  const c=document.getElementById(id); if(!c) return;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,88,88);
  const cx=44,cy=44,r=34;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=5;ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+(val/100)*Math.PI*2);
  ctx.strokeStyle=col;ctx.lineWidth=5;ctx.lineCap='round';ctx.stroke();
}

function drawDetailChart(s) {
  const c=document.getElementById('detailC'); if(!c) return;
  if(detailChart){detailChart.destroy();}
  const isBull=s.direction==='bullish';
  const col=isBull?'#10b981':'#ef4444';
  detailChart=new Chart(c.getContext('2d'),{
    type:'line',
    data:{
      labels:s.dates,
      datasets:[
        {label:'Price',data:s.price_history,borderColor:col,borderWidth:2,fill:true,
          backgroundColor:(ctx)=>{
            const g=ctx.chart.ctx.createLinearGradient(0,0,0,200);
            g.addColorStop(0,col+'28');g.addColorStop(1,col+'00');return g;
          },pointRadius:0,tension:0.3,order:1},
        {label:'SMA 20',data:s.sma20,borderColor:'#f59e0b',borderWidth:1.5,
          borderDash:[4,4],fill:false,pointRadius:0,tension:0.3,order:2},
        {label:'SMA 50',data:s.sma50,borderColor:'#8b5cf6',borderWidth:1.5,
          borderDash:[4,4],fill:false,pointRadius:0,tension:0.3,order:3},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{intersect:false,mode:'index'},
      plugins:{
        legend:{display:true,labels:{color:'#5a6070',font:{size:10,family:'DM Mono'},
          usePointStyle:true,pointStyleWidth:14,boxHeight:2,padding:14}},
        tooltip:{backgroundColor:'rgba(9,11,15,0.97)',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleColor:'#dde1eb',bodyColor:'#8b95a8',
          titleFont:{family:'Syne',size:12,weight:'700'},bodyFont:{family:'DM Mono',size:11},
          padding:12,
          callbacks:{label:(ctx)=>{
            if(ctx.raw==null) return null;
            return ' '+ctx.dataset.label+': ₹'+Number(ctx.raw).toLocaleString('en-IN');
          }}}
      },
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.03)'},
          ticks:{color:'#3d4454',font:{size:9,family:'DM Mono'},maxTicksLimit:8,
            callback:(v,i)=>s.dates[i]?s.dates[i].slice(5):''}},
        y:{position:'right',grid:{color:'rgba(255,255,255,0.03)'},
          ticks:{color:'#3d4454',font:{size:9,family:'DM Mono'},
            callback:v=>'₹'+Number(v).toLocaleString('en-IN')}}
      }
    }
  });
}
